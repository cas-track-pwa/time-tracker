<!--?xml version="1.0" encoding="UTF-8"?-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">

    <defs>

        <linearGradient id="blueArc" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6AB7FF"></stop>
            <stop offset="100%" stop-color="#1F6DFF"></stop>
        </linearGradient>

        <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF"></stop>
            <stop offset="1" stop-color="#F5F7FA"></stop>
        </linearGradient>

        <radialGradient id="background" cx="50%" cy="40%" r="70%">
            <stop offset="0%" stop-color="#FFFFFF"></stop>
            <stop offset="100%" stop-color="#F2F5FA"></stop>
        </radialGradient>

        <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity=".18"></feDropShadow>
        </filter>

    </defs>

    <!-- Background -->

    <rect width="512" height="512" fill="url(#background)"></rect>

    <!-- Clock -->

    <g filter="url(#shadow)">

        <circle cx="195" cy="220" r="145" fill="white" stroke="#16325E" stroke-width="16"></circle>

        <!-- Progress Arc -->

        <path d="M302 95
               A145 145 0 0 1
               313 310" fill="none" stroke="url(#blueArc)" stroke-width="20" stroke-linecap="round"></path>

        <!-- Hour Marks -->

        <g stroke="#16325E" stroke-width="6" stroke-linecap="round">

            <line x1="195" y1="93" x2="195" y2="110"></line>
            <line x1="195" y1="330" x2="195" y2="347"></line>

            <line x1="68" y1="220" x2="85" y2="220"></line>
            <line x1="305" y1="220" x2="322" y2="220"></line>

            <line x1="118" y1="145" x2="128" y2="155"></line>
            <line x1="262" y1="145" x2="252" y2="155"></line>

            <line x1="118" y1="295" x2="128" y2="285"></line>
            <line x1="262" y1="295" x2="252" y2="285"></line>

        </g>

        <!-- Hands -->

        <g stroke="#16325E" stroke-width="14" stroke-linecap="round">

            <line x1="195" y1="220" x2="132" y2="170"></line>

            <line x1="195" y1="220" x2="270" y2="150"></line>

        </g>

        <circle cx="195" cy="220" r="15" fill="#16325E"></circle>

    </g>

    <!-- Invoice -->

    <g filter="url(#shadow)">

        <path fill="url(#paper)" d="
            M275 120
            h125
            l35 35
            v210
            c0 20-16 36-36 36
            h-124
            c-20 0-36-16-36-36
            z"></path>

        <!-- Fold -->

        <path fill="#E8EDF3" d="
            M400 120
            v35
            h35"></path>

        <!-- Dollar -->

        <text x="340" y="195" text-anchor="middle" font-size="70" font-family="Arial,Helvetica,sans-serif" font-weight="700" fill="#1F6DFF">$</text>

        <!-- Lines -->

        <g stroke="#B5BEC9" stroke-width="8" stroke-linecap="round">

            <line x1="305" y1="235" x2="425" y2="235"></line>
            <line x1="305" y1="270" x2="425" y2="270"></line>

            <line x1="305" y1="315" x2="420" y2="315"></line>
            <line x1="305" y1="350" x2="420" y2="350"></line>

            <line x1="305" y1="390" x2="395" y2="390" stroke="#1F6DFF"></line>

        </g>

        <!-- Bullets -->

        <g fill="#AAB4C0">

            <circle cx="285" cy="315" r="7"></circle>
            <circle cx="285" cy="350" r="7"></circle>

        </g>

    </g>

</svg>